<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Facturo — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-container">
  <h1>Facturo</h1>

  <!-- Login -->
  <form id="form-login">
    <div class="form-group">
      <label>Email</label>
      <input id="login-email" type="email" required>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input id="login-password" type="password" required>
    </div>
    <p id="login-error" class="error-msg"></p>
    <button type="submit" class="btn btn-primary" style="width:100%">Entrar</button>
  </form>

  <hr style="border-color:#334155;margin:24px 0">

  <!-- Registro -->
  <details>
    <summary style="cursor:pointer;color:#94a3b8;font-size:13px">¿No tienes cuenta? Regístrate</summary>
    <form id="form-register" style="margin-top:16px">
      <div class="form-group"><label>Nombre</label><input id="reg-nombre" required></div>
      <div class="form-group"><label>Apellidos</label><input id="reg-apellidos" required></div>
      <div class="form-group"><label>NIF</label><input id="reg-nif" required></div>
      <div class="form-group"><label>Email</label><input id="reg-email" type="email" required></div>
      <div class="form-group"><label>Contraseña</label><input id="reg-password" type="password" required></div>
      <p id="register-error" class="error-msg"></p>
      <button type="submit" class="btn btn-primary" style="width:100%">Registrarse</button>
    </form>
  </details>
</div>
<script type="module" src="js/auth.js"></script>
</body>
</html>
