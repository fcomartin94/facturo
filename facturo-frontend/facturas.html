<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Facturo — Facturas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
  <a href="facturas.html" class="active">Facturas</a>
  <a href="clientes.html">Clientes</a>
  <span class="spacer"></span>
  <span class="user" id="user-name"></span>
  <button class="btn btn-sm" id="btn-logout" style="background:transparent;color:#94a3b8">Salir</button>
</nav>
<main>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
    <h1>Facturas</h1>
    <button class="btn btn-primary" id="btn-new-factura">+ Nueva factura</button>
  </div>
  <table>
    <thead>
      <tr>
        <th>Número</th><th>Fecha emisión</th><th>Total</th><th>Estado</th><th>Acciones</th>
      </tr>
    </thead>
    <tbody id="facturas-tbody"></tbody>
  </table>
</main>

<!-- Modal nueva factura -->
<div id="modal-factura"
  style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);align-items:flex-start;justify-content:center;z-index:100;overflow-y:auto;padding:40px 16px">
  <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;padding:32px;width:100%;max-width:600px">
    <h2 style="margin-bottom:20px;font-size:18px">Nueva factura</h2>
    <form id="form-factura">

      <div class="form-group">
        <label>Cliente *</label>
        <select id="f-cliente" required
          style="width:100%;background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:8px 12px;border-radius:6px">
          <option value="">— Selecciona cliente —</option>
        </select>
      </div>

      <div class="form-group">
        <label>Fecha de emisión *</label>
        <input id="f-fecha" type="date" required>
      </div>

      <!-- Líneas de factura -->
      <div class="form-group">
        <label style="display:block;margin-bottom:8px">Líneas</label>
        <div style="display:flex;gap:8px;margin-bottom:4px;color:#64748b;font-size:12px">
          <span style="flex:2">Concepto</span>
          <span style="width:80px">Cantidad</span>
          <span style="width:100px">Precio u.</span>
          <span style="width:90px;text-align:right">Importe</span>
          <span style="width:28px"></span>
        </div>
        <div id="lineas-container"></div>
        <button type="button" id="btn-add-linea" class="btn"
          style="margin-top:8px;background:#334155;color:#e2e8f0;font-size:12px">+ Añadir línea</button>
      </div>

      <!-- Preview de totales (se actualiza en tiempo real) -->
      <div style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:16px;margin-bottom:16px;font-size:13px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;color:#94a3b8">
          <span>Base imponible</span><strong id="preview-base">0,00 €</strong>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;color:#94a3b8">
          <span>IVA (21%)</span><strong id="preview-iva">0,00 €</strong>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;color:#94a3b8">
          <span>IRPF (15%)</span><strong id="preview-irpf">0,00 €</strong>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:15px;border-top:1px solid #334155;padding-top:10px">
          <span>Total</span>
          <strong id="preview-total" style="color:#818cf8">0,00 €</strong>
        </div>
      </div>

      <p id="form-error" class="error-msg"></p>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button type="button" class="btn" id="btn-modal-close"
          style="background:#334155;color:#e2e8f0">Cancelar</button>
        <button type="submit" class="btn btn-primary">Crear factura</button>
      </div>
    </form>
  </div>
</div>

<script type="module" src="js/facturas.js"></script>
</body>
</html>
