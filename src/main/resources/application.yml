spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/facturo_db}
    username: ${SPRING_DATASOURCE_USERNAME:facturo_user}
    password: ${SPRING_DATASOURCE_PASSWORD:facturo_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

facturo:
  jwt:
    secret: ${FACTURO_JWT_SECRET:c2VjcmV0LWtleS1tdXktbGFyZ2EtcGFyYS1qd3QtZmFjdHVybw==}
    expiration-ms: ${FACTURO_JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.facturo: DEBUG
    org.springframework.security: DEBUG
