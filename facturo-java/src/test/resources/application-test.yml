spring:
  datasource:
    url: jdbc:h2:mem:facturotest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

facturo:
  jwt:
    secret: c2VjcmV0LWtleS1tdXktbGFyZ2EtcGFyYS1qd3QtZmFjdHVybw==
    expiration-ms: 3600000

logging:
  level:
    com.facturo: INFO
    org.springframework.security: WARN
